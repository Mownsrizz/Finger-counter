<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracking Galaxy - Final Build</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- KHÓA CỨNG PHIÊN BẢN: Chống lỗi tải file AI trên Opera/Chrome -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js"></script>
</head>
<body>
    <div class="split-screen">
        <div class="panel">
            <h3>App 1: Camera & AI Controller</h3>
            <div class="video-container">
                <!-- THÊM autoplay muted playsinline ĐỂ TRÌNH DUYỆT KHÔNG CHẶN -->
                <video id="input_video" style="display:none;" playsinline autoplay muted></video>
                <canvas id="controller_canvas" width="640" height="480"></canvas>
                <div id="status_text">Khởi động AI...</div>
            </div>
        </div>
        <div class="panel">
            <h3>App 2: Galaxy Universe</h3>
            <canvas id="galaxy_canvas" width="1000" height="800"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
